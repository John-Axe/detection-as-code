title: AWS Root Account Console Login
id: b9a4d6e2-3c71-49f8-8a02-6d5c4b3a2f10
status: experimental
description: >
  Detects an interactive console login using the AWS account root user.
  Root should be locked away with MFA and used almost never; any console
  login is high-signal and worth alerting on.
references:
  - https://docs.aws.amazon.com/IAM/latest/UserGuide/id_root-user.html
  - https://attack.mitre.org/techniques/T1078/004/
author: Joao Machado
date: 2026-06-22
tags:
  - attack.initial_access
  - attack.t1078.004
logsource:
  product: aws
  service: cloudtrail
detection:
  selection:
    eventName: ConsoleLogin
    userIdentity.type: Root
  condition: selection
falsepositives:
  - Rare, expected break-glass root usage by an administrator
level: high
