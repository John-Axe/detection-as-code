title: AWS Console Login Without MFA
id: d3e8f1a4-7b29-4c5d-9e61-2a8c7d4b5f93
status: experimental
description: >
  Detects a successful interactive AWS console login where multi-factor
  authentication was not used. Credential-only console access is a common
  foothold for an attacker who has stolen a password but lacks a second
  factor.
references:
  - https://docs.aws.amazon.com/IAM/latest/UserGuide/id_credentials_mfa.html
  - https://attack.mitre.org/techniques/T1078/004/
author: Joao Machado
date: 2026-06-22
tags:
  - attack.initial-access
  - attack.t1078.004
logsource:
  product: aws
  service: cloudtrail
detection:
  selection:
    eventName: ConsoleLogin
    responseElements.ConsoleLogin: Success
  filter:
    additionalEventData.MFAUsed: 'Yes'
  condition: selection and not filter
falsepositives:
  - Accounts that are intentionally exempt from MFA enrollment, if any
level: high
