name: detection-ci

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  validate-and-test:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2

      - name: Set up Python
        uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1 # v6.3.0
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Validate Sigma rules (syntax + schema)
        run: sigma check rules/

      - name: Validate Elastic TOML rules (schema + ATT&CK)
        run: python tests/validate_toml.py

      - name: Detection-hygiene gate (metadata + test fixtures)
        run: python scripts/check_hygiene.py

      - name: Convert Sigma rules to Elastic, Splunk, and Sentinel queries
        run: ./scripts/convert_rules.sh

      - name: Run detection unit tests (Sigma + TOML)
        run: pytest -v

      - name: Upload converted SIEM queries
        uses: actions/upload-artifact@b4b15b8c7c6ac21ea08fcf65892d2ee8f75cf882 # v4.4.3
        with:
          name: converted-siem-queries
          path: build/

      - name: Secret scan (gitleaks)
        run: |
          curl -sSfL https://github.com/gitleaks/gitleaks/releases/download/v8.30.1/gitleaks_8.30.1_linux_x64.tar.gz \
            | tar -xz gitleaks
          ./gitleaks detect --source=. --exit-code=1 --redact
