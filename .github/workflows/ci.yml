name: detection-ci

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  validate-and-test:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Set up Python
        uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1 # v6.3.0
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install --require-hashes -r requirements.txt

      - name: Validate Sigma rules (syntax + schema)
        run: sigma check rules/

      - name: Validate Elastic TOML rules (schema + ATT&CK)
        run: python tests/validate_toml.py

      - name: Detection-hygiene gate (metadata + test fixtures)
        run: python scripts/check_hygiene.py

      - name: Convert Sigma rules to Elastic, Splunk, and Sentinel queries
        run: ./scripts/convert_rules.sh

      - name: Run detection unit tests (Sigma + TOML)
        run: pytest -v

      - name: Upload converted SIEM queries
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: converted-siem-queries
          path: build/

      - name: Secret scan (gitleaks)
        run: |
          curl -sSfL -o gitleaks.tar.gz \
            https://github.com/gitleaks/gitleaks/releases/download/v8.30.1/gitleaks_8.30.1_linux_x64.tar.gz
          echo "551f6fc83ea457d62a0d98237cbad105af8d557003051f41f3e7ca7b3f2470eb  gitleaks.tar.gz" | sha256sum --check
          tar -xzf gitleaks.tar.gz gitleaks
          ./gitleaks detect --source=. --exit-code=1 --redact
