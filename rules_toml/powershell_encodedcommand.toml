[metadata]
creation_date = "2026/06/22"
updated_date = "2026/06/22"
maturity = "production"

[rule]
author = ["Joao Machado"]
rule_id = "f4d9c1a7-2e6b-4c83-9a51-0b7d6e2f1c34"
name = "Suspicious PowerShell EncodedCommand Execution"
description = """
Detects PowerShell started with an encoded command argument (-enc /
-EncodedCommand). Attackers base64-encode payloads to obfuscate intent and
slip past naive string matching.
"""
severity = "high"
risk_score = 73
type = "query"
language = "kuery"
index = ["logs-endpoint.events.process-*", "winlogbeat-*"]
query = '''
process.name : "powershell.exe" and process.command_line : ("* -enc *" or "* -EncodedCommand *")
'''
references = ["https://attack.mitre.org/techniques/T1059/001/"]
false_positives = ["Administrative or deployment scripts that legitimately pass encoded commands"]

[[rule.threat]]
framework = "MITRE ATT&CK"
[rule.threat.tactic]
id = "TA0002"
name = "Execution"
reference = "https://attack.mitre.org/tactics/TA0002/"
[[rule.threat.technique]]
id = "T1059"
name = "Command and Scripting Interpreter"
reference = "https://attack.mitre.org/techniques/T1059/"
[[rule.threat.technique.subtechnique]]
id = "T1059.001"
name = "PowerShell"
reference = "https://attack.mitre.org/techniques/T1059/001/"
